# config.yaml
model:
  architecture: mobilenet_v2
  input_size: 224
  num_classes: 2
  dropout1: 0.3
  dropout2: 0.2

training:
  optimizer: adam
  lr_phase1: 0.001
  lr_phase2: 0.0001
  batch_size: 32
  epochs_phase1: 10
  epochs_phase2: 20
  early_stopping_patience: 5
  scheduler: ReduceLROnPlateau
  scheduler_patience: 3
  class_weights:
    real: 1.3665
    spoof: 0.7885

data:
  nuaa_split: "data/nuaa_split.json"
  nuaa_root: "data/nuaa/raw"
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

evaluation:
  threshold: 0.5
  metrics: [precision, recall, f1, hter, auc]